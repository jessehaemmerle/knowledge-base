version: "3.9"

services:
  db:
    image: mariadb:11.4
    container_name: kb_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: knowledgebase
      MYSQL_USER: kb_user
      MYSQL_PASSWORD: kb_password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-ukb_user", "-pkb_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kb_php
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: knowledgebase
      DB_USER: kb_user
      DB_PASSWORD: kb_password
      APP_ENV: production
      APP_DEBUG: "0"
      APP_SESSION_NAME: kb_session
    volumes:
      - ./backend:/var/www/backend:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: kb_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/frontend:ro
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  db_data:
